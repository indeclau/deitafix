# Configuración de SonarCloud para Deitafix.
#
# El repo usa Automatic Analysis (no hay step de scanner en el workflow); este
# archivo fija metadatos y exclusiones de reglas versionadas junto al código.
sonar.projectKey=indeclau_deitafix
sonar.organization=dakovid

# --- Exclusiones de reglas (falsos positivos documentados) ---
#
# go:S2077 en internal/engine/mysql.go: "dynamically formatted SQL query".
# Es un falso positivo. La introspección de esquema construye el IN (...) con N
# placeholders "?" fijos generados por el propio código (uno por tabla de la
# whitelist); los nombres de tabla viajan como argumentos parametrizados
# (args...), nunca interpolados en el string. No hay ninguna entrada de usuario
# concatenada en la query, por lo que no existe superficie de inyección.
# database/sql no admite pasar un slice como parámetro de IN, de ahí la
# construcción con N placeholders. Ver también el marcador NOSONAR en la línea.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S2077
sonar.issue.ignore.multicriteria.e1.resourceKey=internal/engine/mysql.go
