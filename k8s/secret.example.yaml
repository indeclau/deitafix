# secret.example.yaml — PLANTILLA. NO contiene credenciales reales.
#
# Copiá este archivo a secret.yaml, reemplazá los placeholders por los valores
# reales del cluster y aplicá SOLO ese (nunca commitees secret.yaml).
#
# DATABASE_URL debe apuntar al usuario RESTRINGIDO de la base (prod_datafix),
# nunca al usuario de la aplicación.
apiVersion: v1
kind: Secret
metadata:
  name: deitafix-secrets
  labels:
    app.kubernetes.io/name: deitafix
type: Opaque
stringData:
  # Conexión con el usuario restringido. Postgres o MySQL:
  #   postgres://prod_datafix:CAMBIAR@postgres-host:5432/midb
  #   mysql://prod_datafix:CAMBIAR@mysql-host:3306/midb
  DATABASE_URL: "postgres://prod_datafix:CAMBIAR@postgres-host:5432/midb"

  # Opcional: habilita la capa de IA. Si se deja vacío, la IA degrada limpio.
  # Podés borrar esta clave si no vas a usar IA.
  AI_API_KEY: ""
